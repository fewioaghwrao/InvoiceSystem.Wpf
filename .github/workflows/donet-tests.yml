name: .NET WPF Tests

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore InvoiceSystem.Wpf.sln

      - name: Build
        run: dotnet build InvoiceSystem.Wpf.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test InvoiceSystem.Wpf.Tests/InvoiceSystem.Wpf.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"